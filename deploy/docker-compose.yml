# بيئة تطوير محلية كاملة: Oracle 23ai Free + ORDS + الواجهة
version: "3.9"

services:
  oracle:
    image: container-registry.oracle.com/database/free:latest
    container_name: rehab-oracle
    environment:
      ORACLE_PWD: ${ORACLE_PWD:-Rehab_2026}
    ports:
      - "1521:1521"
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ../db:/db:ro      # سكربتات التثبيت متاحة داخل الحاوية
    healthcheck:
      test: ["CMD", "sqlplus", "-L", "system/${ORACLE_PWD:-Rehab_2026}@//localhost:1521/FREEPDB1", "@/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 10

  ords:
    image: container-registry.oracle.com/database/ords:latest
    container_name: rehab-ords
    depends_on:
      oracle:
        condition: service_healthy
    environment:
      DBHOST: oracle
      DBPORT: 1521
      DBSERVICENAME: FREEPDB1
      ORACLE_PWD: ${ORACLE_PWD:-Rehab_2026}
    ports:
      - "8080:8080"   # /ords

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: rehab-frontend
    depends_on:
      - ords
    environment:
      BACKEND_API_URL: http://ords:8080/ords/rehab/api/v1
      NEXT_PUBLIC_API_BASE: /api/backend
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev_secret_change_me}
    ports:
      - "3000:3000"

volumes:
  oracle-data:
