name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ---------- فحص الواجهة الأمامية ----------
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install --no-audit --no-fund
      - run: npm run lint --if-present
      - run: npm run type-check
      - run: npm run build
        env:
          BACKEND_API_URL: https://api.example.sa/ords/rehab/api/v1
          NEXTAUTH_SECRET: ci_dummy_secret

  # ---------- التحقق من سكربتات قاعدة البيانات ----------
  database:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: تحقق نحوي مبدئي لسكربتات SQL
        run: |
          echo "فحص وجود السكربتات بالترتيب الصحيح"
          for f in db/0*.sql db/1*.sql; do
            test -f "$f" && echo "OK: $f"
          done

  # ---------- النشر إلى Vercel (الواجهة) ----------
  deploy-vercel:
    needs: [frontend]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Vercel
        run: npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --cwd frontend --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
